<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Anggota</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="./index.html">Tech Community</a>
        <div class="nav-links">
        <a href="./index.html">Beranda</a>
        <a href="./gallery.html">Multimedia</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
    <div class="card">
      <h3 style="margin-top: 0; margin-bottom: 20px;">Daftar Anggota Baru</h3>

      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="contoh@email.com">
      </div>

      <div class="form-group">
        <label>Bidang Minat</label>
        <select id="minat">
          <option value="">-- Pilih bidang minat --</option>
          <option>Web Development</option>
          <option>Mobile Development</option>
          <option>Data Science</option>
          <option>UI/UX Design</option>
          <option>Cybersecurity</option>
          <option>Cloud Computing</option>
        </select>
      </div>

      <button class="btn-submit" onclick="simpanData()">Submit</button>

      <div id="hasilInput" style="display:none;">
        <div class="alert">
          <strong>Data berhasil disimpan!</strong>
          <div id="detailHasil" style="margin-top: 10px;"></div>
        </div>
      </div>
    </div>

    <div class="text-center">
      <a href="./index.html" class="btn" style="color: #666; border-color: #ccc; padding: 5px 10px; font-weight: normal;">← Kembali ke Beranda</a>
    </div>
  </div>

  <script src="script.js"></script>
    

</body>
</html>
